<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Zapachów - Oporów</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        #map {
            height: 70vh;
            width: 100%;
        }

        button {
            width: 90%;
            max-width: 400px;
            display: block;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Monitoring Zapachów - Oporów</h1>

<div id="map"></div>
    <p id="coords">
    Kliknij na mapie, aby wybrać lokalizację.
</p>
    <hr>

<h2>Zgłoszenie</h2>

<label for="smellType">Typ zapachu / skojarzenie zapachowe:</label><br>
<select id="smellType">
    <option value="scieki">Ścieki</option>
    <option value="chemiczny">Chemiczny</option>
    <option value="gaz">Gaz z sieci dystrybucyjnej</option>
    <option value="spalenizna">Spalenizna</option>
    <option value="plastik">Plastik / guma</option>
    <option value="komunikacyjny">Typowy dla ruchu ulicznego</option>
    <option value="rolniczy">Rolniczy</option>
    <option value="inny">Inny</option>
</select>

<br><br>

<label for="intensity">Intensywność:</label><br>
<select id="intensity">
    <option value="1">1 - słaby</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5 - mocny</option>
</select>

<br><br>

<label for="smellDate">Data wystąpienia:</label><br>
<input type="date" id="smellDate">

<br><br>

<label for="smellTime">Godzina wystąpienia:</label><br>
<input type="time" id="smellTime">

<br><br>

<button id="submitBtn">
    Wyślij zgłoszenie
</button>

<button>Zgłoś zapach</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([50.770, 16.285], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);
    let marker = null;

map.on('click', function(e) {

    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    document.getElementById("coords").innerText =
        `Wybrana lokalizacja: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
});
document
    .getElementById("submitBtn")
    .addEventListener("click", function() {

        if (!marker) {
            alert("Wybierz lokalizację na mapie.");
            return;
        }

        const report = {
            lat: marker.getLatLng().lat,
            lon: marker.getLatLng().lng,
            smellType: document.getElementById("smellType").value,
            intensity: document.getElementById("intensity").value,
            smellDate: document.getElementById("smellDate").value,
            smellTime: document.getElementById("smellTime").value
        };

        console.log(report);

        alert(
            "Zgłoszenie przygotowane.\n\n" +
            JSON.stringify(report, null, 2)
        );
    });
</script>

</body>
</html>
