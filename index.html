<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Zapachów - Oporów</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        #map {
            height: 70vh;
            width: 100%;
        }

        button {
            width: 90%;
            max-width: 400px;
            display: block;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Monitoring Zapachów - Oporów</h1>

<div id="map"></div>
    <p id="coords">
    Kliknij na mapie, aby wybrać lokalizację.
</p>

<button>Zgłoś zapach</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([50.770, 16.285], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);
    let marker = null;

map.on('click', function(e) {

    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    document.getElementById("coords").innerText =
        `Wybrana lokalizacja: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
});

</script>

</body>
</html>
